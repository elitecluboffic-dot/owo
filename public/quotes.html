<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owo Bimxr - Quotes</title>
  <meta name="theme-color" content="#080810">

  <!-- SEO Essentials -->
<meta name="description" content="Kumpulan quote terpilih dari komunitas OWO BIM.">
<meta name="keywords" content="owo bim, quotes, quote komunitas, discord quotes, kraxx">
<meta name="author" content="bimxr">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://owo.kraxx.my.id/quotes">

<!-- Open Graph (WhatsApp, Discord, Facebook preview) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Owo Bimxr - Quotes">
<meta property="og:description" content="Kumpulan quote terpilih dari komunitas OWO BIM, dikurasi dengan hati.">
<meta property="og:url" content="https://owo.kraxx.my.id/quotes">
<meta property="og:site_name" content="OWO BIM">
<meta property="og:locale" content="id_ID">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Owo Bimxr - Quotes">
<meta name="twitter:description" content="Kumpulan quote terpilih dari komunitas OWO BIM.">

  <!-- CLS Fix: preconnect sebelum load font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #080810;
      --surface:     #0e0e1a;
      --surface2:    #13131f;
      --surface3:    #181825;
      --border:      rgba(255,255,255,0.05);
      --border-md:   rgba(255,255,255,0.09);
      --gold:        #d4a847;
      --gold2:       #f0cc7a;
      --gold3:       #b88c32;
      --gold-glow:   rgba(212,168,71,0.15);
      --gold-dim:    rgba(212,168,71,0.08);
      --text:        #eaeaf5;
      --text-soft:   #b8b8d0;
      --text-muted:  #5a5a78;
      --text-dim:    #2e2e44;
      --accent:      #6a5acd;
      --accent2:     #9b8fe8;
      --accent-dim:  rgba(106,90,205,0.12);
      --radius-card: 16px;
      --radius-sm:   10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      /* CLS Fix: fallback font mirip metrik Outfit supaya tidak shift saat swap */
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(106,90,205,0.07) 0%, transparent 65%);
      top: -250px; right: -180px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(212,168,71,0.06) 0%, transparent 65%);
      bottom: -80px; left: -120px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 64px 28px 100px;
      position: relative;
      z-index: 1;
    }

    /* ─── Badge ─── */
    .badge {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
      min-height: 32px; /* CLS Fix */
    }
    .badge span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-dim);
      border: 1px solid rgba(212,168,71,0.18);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      height: 28px; /* CLS Fix: tinggi tidak berubah saat font swap */
    }
    .badge-dot {
      width: 5px; height: 5px;
      min-width: 5px; /* CLS Fix */
      background: var(--gold);
      border-radius: 50%;
      animation: blink 2.4s ease-in-out infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── Heading ─── */
    h1 {
      text-align: center;
      margin: 0 0 12px;
      /* CLS Fix: Georgia sebagai fallback serif dengan metrik mirip Cormorant */
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }
    h1 .word1 {
      color: var(--text);
      font-weight: 600;
    }
    h1 .word2 {
      display: block;
      font-style: italic;
      font-weight: 700;
      background: linear-gradient(120deg, var(--gold3) 0%, var(--gold2) 45%, var(--gold) 75%, var(--gold3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }

    .tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 44px;
      min-height: 1.2em; /* CLS Fix */
    }

    /* ─── How-to banner ─── */
    .how-to { margin-bottom: 52px; }
    .how-to-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface2);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-card);
      padding: 18px 22px;
      max-width: 560px;
      margin: 0 auto;
      transition: border-color 0.25s;
      min-height: 72px; /* CLS Fix */
    }
    .how-to-inner:hover { border-color: rgba(212,168,71,0.22); }
    .how-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
      line-height: 1;
      width: 28px; /* CLS Fix: emoji tidak bikin reflow */
      text-align: center;
    }
    .how-text { flex: 1; }
    .how-title {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 3px;
      letter-spacing: 0.01em;
    }
    .how-sub {
      font-size: 0.76rem;
      color: var(--text-muted);
      font-weight: 300;
    }
    .how-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--gold-dim);
      border: 1px solid rgba(212,168,71,0.22);
      color: var(--gold);
      text-decoration: none;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      padding: 8px 15px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
      height: 36px;      /* CLS Fix: dimensi tetap */
      flex-shrink: 0;
    }
    .how-btn:hover {
      background: rgba(212,168,71,0.14);
      border-color: rgba(212,168,71,0.35);
    }

    /* ─── Quote Cards ─── */

    /* CLS Fix: reserve ruang sebelum JS inject cards */
    #quotes-container {
      min-height: 420px;
    }

    .quote-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 38px 42px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold3);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
      /* CLS Fix: hanya animasikan transform & opacity, tidak width/height/margin */
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1),
                  border-color 0.3s ease,
                  background 0.3s ease;
      /* CLS Fix: contain mencegah card mempengaruhi layout elemen luar */
      contain: layout style;
    }

    .quote-card::after {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(212,168,71,0.07) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .quote-card:hover {
      transform: translateY(-4px);
      background: var(--surface2);
      border-color: rgba(212,168,71,0.28);
    }
    .quote-card:hover::after { opacity: 1; }

    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    .quote-bigmark {
      position: absolute;
      top: 6px; left: 20px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 7rem;
      line-height: 1;
      color: var(--gold);
      opacity: 0.06;
      font-style: italic;
      pointer-events: none;
      user-select: none;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.22rem;
      line-height: 1.85;
      margin-bottom: 24px;
      font-style: italic;
      font-weight: 400;
      color: var(--text-soft);
      position: relative;
      z-index: 1;
      padding-top: 4px;
    }

    .quote-author {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      min-height: 46px; /* CLS Fix */
    }
    .author-avatar {
      width: 30px; height: 30px;
      min-width: 30px; /* CLS Fix: tidak boleh shrink */
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--gold3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 600;
      color: #fff;
      font-family: 'Outfit', system-ui, sans-serif;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }
    .author-name {
      color: var(--accent2);
      font-weight: 400;
      font-size: 0.84rem;
      letter-spacing: 0.02em;
      font-family: 'Outfit', system-ui, sans-serif;
    }

    /* ─── Empty state ─── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 14px; opacity: 0.35; display: block; }
    .empty-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* ─── Loading ─── */
    .loading {
      text-align: center;
      /* CLS Fix: tinggi sama dengan min-height container supaya tidak collapse */
      min-height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      min-width: 28px; /* CLS Fix */
      border: 1.5px solid var(--border-md);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.14em;
      display: block;
    }

    /* ─── Scroll-to-top ─── */
    #scroll-top {
      position: fixed;
      bottom: 26px; right: 26px;
      width: 40px; height: 40px;
      background: var(--surface2);
      border: 1px solid var(--border-md);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, border-color 0.2s, color 0.2s;
    }
    #scroll-top.show { opacity: 1; pointer-events: all; }
    #scroll-top:hover { border-color: rgba(212,168,71,0.35); color: var(--gold); }

    /* ─── Footer ─── */
    .site-footer {
      text-align: center;
      padding: 0 24px 44px;
      position: relative;
      z-index: 1;
      min-height: 60px; /* CLS Fix */
    }
    .site-footer span {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 0.64rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
    .site-footer a { color: var(--gold); text-decoration: none; }
    .site-footer a:hover { color: var(--gold2); }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .container { padding: 48px 18px 80px; }
      .quote-card { padding: 26px 22px; }
      h1 { font-size: 2.6rem; }
      .how-to-inner { flex-wrap: wrap; gap: 12px; min-height: auto; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="badge">
    <span><span class="badge-dot"></span> OWO BIM · Kraxx.my.id</span>
  </div>

  <h1>
    <span class="word1">💬 Owo</span>
    <span class="word2">Quotes</span>
  </h1>
  <p class="tagline">Quote terpilih dari komunitas — dikurasi dengan hati</p>

<div class="how-to">
  <div class="how-to-inner">
    <span class="how-icon">🤖</span>
    <div class="how-text">
      <div class="how-title">Mau submit quote?</div>
      <div class="how-sub">Gunakan bot Discord OWO BIM untuk submit quote</div>
    </div>
    <a href="https://discord.gg/jHv69FHd" target="_blank" rel="noopener noreferrer" class="how-btn">Join Server →</a>
  </div>
</div>

  <div id="quotes-container">
    <div class="loading">
      <div class="spinner"></div>
      <span class="loading-text">MEMUAT QUOTES...</span>
    </div>
  </div>

</div>

<footer class="site-footer">
  <span>© 2026 OWO BIM · <a href="https://owo.kraxx.my.id/quotes">Quotes OwoBim</a> · Dibuat dengan oleh by @bimxr</span>
</footer>

<div id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
  function getInitials(name) {
    return (name || '??').slice(0, 2).toUpperCase();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadQuotes() {
    try {
      const res = await fetch('/api/quotes');
      const quotes = await res.json();
      const container = document.getElementById('quotes-container');

      if (quotes.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="empty-icon">💬</span>
            <div class="empty-title">Belum ada quote</div>
            <p>Belum ada quote yang disetujui saat ini...</p>
          </div>`;
        return;
      }

      container.innerHTML = quotes.map((q, i) => `
        <div class="quote-card" style="animation-delay:${i * 70}ms">
          <span class="quote-bigmark">"</span>
          <div class="quote-text">"${escapeHtml(q.teks)}"</div>
          <div class="quote-author">
            <div class="author-avatar">${getInitials(q.username)}</div>
            <div class="author-name">— ${escapeHtml(q.username)}</div>
          </div>
        </div>
      `).join('');

    } catch (e) {
      console.error(e);
    }
  }

  window.addEventListener('scroll', () => {
    document.getElementById('scroll-top')
      .classList.toggle('show', window.scrollY > 400);
  });

  loadQuotes();
  setInterval(loadQuotes, 30000);
</script>
</body>
</html>
