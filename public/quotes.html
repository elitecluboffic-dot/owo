<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OWO BIM • Quotes Wall</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    :root {
      --purple: #9b4dff;
      --pink: #ff69b4;
      --dark: #0f0f1a;
      --card: #1a1a2e;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 3rem;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .subtitle { color: #b4b4ff; font-style: italic; }

    .quote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .quote-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
      border: 1px solid rgba(155, 77, 255, 0.3);
    }
    .quote-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(155, 77, 255, 0.3);
    }
    .quote-card::before {
      content: '“';
      font-size: 8rem;
      position: absolute;
      top: -30px;
      right: 10px;
      opacity: 0.1;
      color: var(--purple);
    }
    .quote-text {
      font-size: 1.15rem;
      line-height: 1.5;
      margin-bottom: 15px;
      font-style: italic;
    }
    .quote-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .quote-author img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--purple);
    }
    .admin-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ff4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      opacity: 0;
      transition: 0.3s;
    }
    .quote-card:hover .admin-delete { opacity: 1; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: #9b4dff;
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🦉 OWO BIM</div>
    <h1>Quotes Wall</h1>
    <p class="subtitle">where your server comes alive • Earn • Love • Chaos 💜</p>
  </header>

  <div class="quote-grid" id="quoteGrid">
    <!-- Quotes akan dimuat oleh JS -->
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastText"></span>
  </div>

  <script>
    const API_URL = "https://owo.yourdomain.com/quotes"; // ganti dengan domain kamu nanti

    async function loadQuotes() {
      const res = await fetch(API_URL);
      const quotes = await res.json();

      const grid = document.getElementById("quoteGrid");
      grid.innerHTML = "";

      quotes.forEach(q => {
        const card = document.createElement("div");
        card.className = "quote-card";
        card.innerHTML = `
          <button class="admin-delete" onclick="deleteQuote('${q.id}')">🗑️ Hapus</button>
          <div class="quote-text">"${q.teks}"</div>
          <div class="quote-author">
            <img src="${q.avatar}" alt="${q.username}">
            <div>
              <strong>${q.username}</strong><br>
              <small>${new Date(q.createdAt).toLocaleDateString('id-ID')}</small>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Delete quote (hanya owner)
    async function deleteQuote(id) {
      if (!confirm("Yakin mau hapus quote ini?")) return;
      const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
      if (res.ok) {
        showToast("✅ Quote berhasil dihapus");
        loadQuotes();
      } else {
        showToast("❌ Gagal menghapus quote");
      }
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      document.getElementById("toastText").textContent = text;
      toast.style.display = "flex";
      setTimeout(() => toast.style.display = "none", 4000);
    }

    // Load quotes saat halaman dibuka
    loadQuotes();
  </script>
</body>
</html>
