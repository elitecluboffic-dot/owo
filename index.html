<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OwoCash Simulator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #36393e;
      color: #dcddde;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Tailwind-like utilities */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-end { justify-content: flex-end; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .sticky { position: sticky; }
    .top-0 { top: 0; }
    .fixed { position: fixed; }
    .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
    .z-40 { z-index: 40; }
    .z-50 { z-index: 50; }
    .z-100 { z-index: 100; }
    .overflow-y-auto { overflow-y: auto; }
    .overflow-x-auto { overflow-x: auto; }
    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.75rem; }
    .text-xl { font-size: 1.25rem; }
    .text-2xl { font-size: 1.5rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .text-right { text-align: right; }
    .w-full { width: 100%; }
    .max-w-sm { max-width: 384px; }
    .max-w-lg { max-width: 512px; }
    .max-h-90vh { max-height: 90vh; }
    .mx-4 { margin-left: 16px; margin-right: 16px; }
    .mb-1 { margin-bottom: 4px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mt-1 { margin-top: 4px; }
    .ml-3 { margin-left: 12px; }
    .p-3 { padding: 12px; }
    .p-4 { padding: 16px; }
    .p-6 { padding: 24px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .px-4 { padding-left: 16px; padding-right: 16px; }
    .py-0\.5 { padding-top: 2px; padding-bottom: 2px; }
    .py-1 { padding-top: 4px; padding-bottom: 4px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .py-3 { padding-top: 12px; padding-bottom: 12px; }
    .space-y-3 > * + * { margin-top: 12px; }
    .space-y-6 > * + * { margin-top: 24px; }
    .pb-28 { padding-bottom: 112px; }
    .outline-none { outline: none; }

    /* Colors */
    .bg-dark { background: #36393e; }
    .bg-darker { background: #2f3136; }
    .bg-darkest { background: #202225; }
    .bg-input { background: #40444b; }
    .bg-blue { background: #5865f2; }
    .bg-blue-btn { background: #2563eb; }
    .bg-green-btn { background: #16a34a; }
    .bg-yellow-btn { background: #ca8a04; }
    .bg-purple-btn { background: #7c3aed; }
    .bg-yellow-admin { background: #d97706; }
    .bg-overlay { background: rgba(0,0,0,0.8); }

    .text-blue { color: #5865f2; }
    .text-cyan { color: #00b0f4; }
    .text-gray { color: #9ca3af; }
    .text-yellow { color: #facc15; }
    .text-white { color: #ffffff; }

    /* Components */
    .topnav {
      background: #2f3136;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #202225;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 8px;
    }

    .topnav-title {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .topnav-btns {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 4px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn-blue { background: #2563eb; }
    .btn-green { background: #16a34a; }
    .btn-yellow { background: #ca8a04; }
    .btn-purple { background: #7c3aed; }
    .btn-gray { background: #40444b; }
    .btn-indigo { background: #5865f2; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #36393e;
      padding-bottom: 112px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-row { display: flex; gap: 12px; }
    .msg-row.user { justify-content: flex-end; }

    .avatar {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: #00b0f4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .owo-bubble {
      background: #292b2f;
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 80%;
    }

    .owo-bubble .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .owo-name { font-weight: 600; color: #00b0f4; }
    .owo-badge {
      background: #5865f2;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .owo-time { font-size: 11px; color: #6b7280; }

    .owo-text { font-size: 0.875rem; line-height: 1.5; }
    .owo-text code {
      background: #202225;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .user-bubble {
      max-width: 75%;
    }
    .user-bubble .text {
      background: #5865f2;
      color: white;
      padding: 10px 14px;
      border-radius: 18px;
      border-bottom-right-radius: 4px;
      font-size: 0.875rem;
    }
    .user-bubble .time {
      font-size: 10px;
      color: #6b7280;
      text-align: right;
      margin-top: 4px;
    }

    /* Quick buttons bar */
    #quick-bar {
      position: fixed;
      bottom: 68px;
      left: 0;
      right: 0;
      background: #2f3136;
      padding: 10px 12px;
      overflow-x: auto;
      display: flex;
      gap: 8px;
      z-index: 40;
      scrollbar-width: none;
    }
    #quick-bar::-webkit-scrollbar { display: none; }

    .quick-btn {
      background: #40444b;
      color: #dcddde;
      border: none;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.875rem;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .quick-btn:hover { background: #5865f2; color: white; }
    .quick-btn.purple { background: #7c3aed; color: white; }
    .quick-btn.purple:hover { background: #6d28d9; }

    /* Command input */
    #cmd-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #40444b;
      padding: 10px 12px;
      z-index: 50;
    }

    .cmd-inner {
      background: #36393e;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 8px 16px;
    }

    #command-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #dcddde;
      font-size: 1rem;
    }
    #command-input::placeholder { color: #6b7280; }

    .send-btn {
      margin-left: 12px;
      background: #5865f2;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #4752c4; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-box {
      background: #36393e;
      width: 100%;
      max-width: 384px;
      margin: 0 16px;
      border-radius: 24px;
      padding: 24px;
    }

    .modal-box.large {
      max-width: 512px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-subtitle {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-bottom: 16px;
      margin-top: -8px;
    }

    .modal-input {
      width: 100%;
      background: #202225;
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      outline: none;
      color: #dcddde;
      font-size: 0.95rem;
      margin-bottom: 12px;
      display: block;
    }

    .modal-input.mono { font-family: monospace; font-size: 0.85rem; }
    .modal-input:last-of-type { margin-bottom: 24px; }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      border-radius: 16px;
      font-size: 0.95rem;
    }
    .modal-cancel:hover { color: white; background: #40444b; }

    .modal-confirm {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      font-size: 0.95rem;
      transition: filter 0.15s;
    }
    .modal-confirm:hover { filter: brightness(1.15); }
    .modal-confirm.blue { background: #2563eb; }
    .modal-confirm.green { background: #16a34a; }
    .modal-confirm.yellow { background: #ca8a04; }
    .modal-confirm.purple { background: #7c3aed; }

    /* Admin dashboard */
    .player-card {
      background: #2f3136;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-info { flex: 1; }
    .player-name { font-weight: 600; }
    .player-balance { font-size: 0.875rem; color: #9ca3af; margin-top: 2px; }

    .cash-input {
      background: #202225;
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      width: 110px;
      outline: none;
      color: #dcddde;
      font-size: 0.875rem;
    }

    .set-btn {
      background: #ca8a04;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 0.875rem;
      transition: filter 0.15s;
    }
    .set-btn:hover { filter: brightness(1.15); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: #9ca3af;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
    }
    .modal-close:hover { color: white; background: #40444b; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <div class="topnav">
    <div class="topnav-title">
      <span class="text-blue" style="font-size:1.5rem">#</span>
      <span>main-owo-disini</span>
    </div>
    <div class="topnav-btns">
      <button class="btn btn-blue" onclick="showRegisterModal()">Daftar</button>
      <button class="btn btn-green" onclick="showLoginModal()">Login</button>
      <button class="btn btn-yellow" onclick="showAdminLoginModal()">
        <i class="fa-solid fa-crown"></i> Admin
      </button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- QUICK BUTTONS -->
  <div id="quick-bar">
    <button class="quick-btn" onclick="quickWcf(5000)">wcf 5000</button>
    <button class="quick-btn" onclick="quickWcf('all')">wcf all</button>
    <button class="quick-btn" onclick="checkBalance()">wcash</button>
    <button class="quick-btn purple" onclick="showWebhookSetting()">Webhook</button>
  </div>

  <!-- COMMAND INPUT -->
  <div id="cmd-bar">
    <div class="cmd-inner">
      <input id="command-input" type="text" placeholder="Ketik command..." onkeydown="if(event.key==='Enter') sendCommand()">
      <button class="send-btn" onclick="sendCommand()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div id="register-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">Daftar Akun</div>
      <input id="reg-username" type="text" placeholder="Username (min 3 karakter)" class="modal-input">
      <input id="reg-password" type="password" placeholder="Password" class="modal-input" style="margin-bottom:24px">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="hideRegisterModal()">Batal</button>
        <button class="modal-confirm blue" onclick="doRegister()">Daftar</button>
      </div>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">Login</div>
      <input id="login-username" type="text" placeholder="Username" class="modal-input">
      <input id="login-password" type="password" placeholder="Password" class="modal-input" style="margin-bottom:24px">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="hideLoginModal()">Batal</button>
        <button class="modal-confirm green" onclick="doLogin()">Login</button>
      </div>
    </div>
  </div>

  <!-- ADMIN LOGIN MODAL -->
  <div id="admin-login-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">
        <i class="fa-solid fa-crown" style="color:#facc15"></i> Admin Login
      </div>
      <p class="modal-subtitle">Masukkan password admin</p>
      <input id="admin-password" type="password" placeholder="Password Admin" class="modal-input" style="margin-bottom:24px">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="hideAdminLoginModal()">Batal</button>
        <button class="modal-confirm yellow" onclick="doAdminLogin()">Masuk</button>
      </div>
    </div>
  </div>

  <!-- WEBHOOK MODAL -->
  <div id="webhook-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">Setting Webhook Discord</div>
      <p class="modal-subtitle">Masukkan Webhook URL channel Discord milikmu</p>
      <input id="webhook-url-input" type="text" placeholder="https://discord.com/api/webhooks/..." class="modal-input mono" style="margin-bottom:24px">
      <div class="modal-actions">
        <button class="modal-cancel" onclick="hideWebhookModal()">Batal</button>
        <button class="modal-confirm purple" onclick="saveUserWebhook()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD MODAL -->
  <div id="admin-dashboard" class="modal-overlay hidden">
    <div class="modal-box large">
      <div class="modal-header">
        <div class="modal-title" style="margin-bottom:0">
          <i class="fa-solid fa-crown" style="color:#facc15"></i> Admin Dashboard
        </div>
        <button class="modal-close" onclick="hideAdminDashboard()">✕</button>
      </div>
      <div id="players-list" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
