<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat — OwoCash Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080810;
      --surface: #0e0e1a;
      --border:  rgba(99,102,241,0.15);
      --accent:  #6366f1;
      --accent2: #a5b4fc;
      --hot:     #f43f5e;
      --green:   #10b981;
      --text:    #e2e8f0;
      --muted:   #475569;
      --dim:     #1e1e2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); font-family: 'Space Mono', monospace; color: var(--text); }

    /* ── FLOATING BUTTON ── */
    #chat-toggle {
      position: fixed; bottom: 28px; right: 28px; z-index: 1000;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; box-shadow: 0 8px 32px rgba(99,102,241,0.4);
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    #chat-toggle:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(99,102,241,0.5); }
    #chat-toggle .badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--hot); color: white;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 0.6rem; display: flex; align-items: center; justify-content: center;
      font-weight: 700; display: none;
    }
    #chat-toggle .badge.show { display: flex; }

    /* ── CHAT WINDOW ── */
    #chat-window {
      position: fixed; bottom: 96px; right: 28px; z-index: 999;
      width: 360px; height: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      transform: scale(0.9) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    #chat-window.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    /* ── HEADER ── */
    .chat-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(135deg, rgba(99,102,241,0.08), transparent);
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--text); }
    .chat-header-status { font-size: 0.58rem; color: var(--green); letter-spacing: 0.1em; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .chat-header-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .chat-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; transition: color 0.2s; }
    .chat-close:hover { color: var(--text); }

    /* ── LOGIN PANEL ── */
    #login-panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 24px; gap: 14px;
    }
    .login-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.08em; color: var(--text); text-align: center; }
    .login-sub { font-size: 0.6rem; color: var(--muted); text-align: center; line-height: 1.7; letter-spacing: 0.05em; }
    .login-field { width: 100%; background: var(--dim); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.72rem; outline: none; transition: border-color 0.2s; }
    .login-field:focus { border-color: rgba(99,102,241,0.4); }
    .login-field::placeholder { color: var(--muted); opacity: 0.5; }
    .login-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: 6px; padding: 11px; font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .login-btn:hover { background: #4f46e5; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── MESSAGES ── */
    #messages-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #messages-panel.active { display: flex; }
    #msg-list {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
    }
    #msg-list::-webkit-scrollbar { width: 3px; }
    #msg-list::-webkit-scrollbar-thumb { background: var(--dim); }

    .msg { display: flex; flex-direction: column; max-width: 80%; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.admin { align-self: flex-start; align-items: flex-start; }
    .msg-bubble {
      padding: 9px 13px; border-radius: 10px;
      font-size: 0.72rem; line-height: 1.5; letter-spacing: 0.02em;
      word-break: break-word;
    }
    .msg.user  .msg-bubble { background: var(--accent); color: white; border-bottom-right-radius: 3px; }
    .msg.admin .msg-bubble { background: var(--dim); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .msg-time { font-size: 0.55rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; }
    .msg-sender { font-size: 0.58rem; color: var(--accent2); letter-spacing: 0.08em; margin-bottom: 3px; font-weight: 700; }

    .sys-msg { text-align: center; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; padding: 4px 12px; background: rgba(99,102,241,0.04); border-radius: 20px; align-self: center; }

    .typing-indicator { align-self: flex-start; display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: var(--dim); border-radius: 10px; border: 1px solid var(--border); }
    .typing-indicator span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: typing 1.2s ease-in-out infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    /* ── INPUT ── */
    .chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: var(--dim); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px;
      color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.72rem;
      outline: none; resize: none; max-height: 100px; line-height: 1.4;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: rgba(99,102,241,0.4); }
    #msg-input::placeholder { color: var(--muted); opacity: 0.5; }
    #send-btn {
      background: var(--accent); border: none; border-radius: 8px;
      width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: all 0.2s; flex-shrink: 0;
    }
    #send-btn:hover { background: #4f46e5; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── CLOSED STATE ── */
    #closed-panel {
      display: none; flex: 1; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; padding: 28px;
    }
    #closed-panel.active { display: flex; }
    .closed-icon { font-size: 2rem; }
    .closed-text { font-size: 0.68rem; color: var(--muted); text-align: center; line-height: 1.8; }

    /* ── STATUS BAR ── */
    .conn-bar {
      padding: 5px 16px; font-size: 0.58rem; letter-spacing: 0.1em;
      text-align: center; display: none; flex-shrink: 0;
    }
    .conn-bar.show { display: block; }
    .conn-bar.connecting { background: rgba(245,158,11,0.1); color: #f59e0b; border-bottom: 1px solid rgba(245,158,11,0.15); }
    .conn-bar.offline    { background: rgba(244,63,94,0.1);  color: var(--hot); border-bottom: 1px solid rgba(244,63,94,0.15); }

    @media (max-width: 480px) {
      #chat-window { width: calc(100vw - 24px); right: 12px; bottom: 80px; height: 460px; }
      #chat-toggle { bottom: 16px; right: 16px; }
    }
  </style>
</head>
<body>

<!-- Floating button -->
<button id="chat-toggle" onclick="toggleChat()" title="Live Chat">
  💬
  <span class="badge" id="notif-badge">0</span>
</button>

<!-- Chat window -->
<div id="chat-window">
  <div class="chat-header">
    <div class="chat-avatar">🎧</div>
    <div class="chat-header-info">
      <div class="chat-header-name">OwoCash Support</div>
      <div class="chat-header-status" id="header-status">Tim Support Online</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>

  <div class="conn-bar" id="conn-bar"></div>

  <!-- Login panel -->
  <div id="login-panel">
    <div class="login-title">Mulai Live Chat</div>
    <div class="login-sub">Masukkan info kamu untuk memulai sesi chat dengan tim support OwoCash.</div>
    <input class="login-field" id="inp-username" type="text" placeholder="Username OWO BIM kamu" maxlength="40">
    <input class="login-field" id="inp-discord"  type="text" placeholder="Discord tag / ID kamu"  maxlength="60">
    <button class="login-btn" id="start-btn" onclick="startChat()">Mulai Chat →</button>
  </div>

  <!-- Messages panel -->
  <div id="messages-panel">
    <div id="msg-list"></div>
    <div class="chat-input-area">
      <textarea id="msg-input" rows="1" placeholder="Ketik pesan..." maxlength="2000"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- Closed panel -->
  <div id="closed-panel">
    <div class="closed-icon">✅</div>
    <div class="closed-text">Sesi chat ini telah ditutup oleh admin.<br>Tiketmu telah diselesaikan.<br><br>Terima kasih telah menghubungi OwoCash!</div>
    <button class="login-btn" style="margin-top:8px" onclick="resetChat()">Mulai Chat Baru</button>
  </div>
</div>

<script>
  // ── KONFIGURASI ──────────────────────────────────────────────
  const WS_URL = 'wss://livechat.kraxx.my.id/ws';

  // ────────────────────────────────────────────────────────────
  let ws         = null;
  let sessionId  = localStorage.getItem('owo_session') || null;
  let username   = localStorage.getItem('owo_username') || null;
  let discord    = localStorage.getItem('owo_discord')  || null;
  let isOpen     = false;
  let unread     = 0;
  let reconnectTimer = null;
  let pingTimer  = null;

  // ── UI helpers ───────────────────────────────────────────────
  function toggleChat() {
    isOpen = !isOpen;
    document.getElementById('chat-window').classList.toggle('open', isOpen);
    document.getElementById('chat-toggle').innerHTML = isOpen
      ? '✕<span class="badge" id="notif-badge"></span>'
      : '💬<span class="badge" id="notif-badge"></span>';
    if (isOpen) {
      unread = 0;
      updateBadge();
      scrollBottom();
    }
  }

  function updateBadge() {
    const b = document.getElementById('notif-badge');
    if (!b) return;
    if (unread > 0 && !isOpen) {
      b.textContent = unread;
      b.classList.add('show');
    } else {
      b.classList.remove('show');
    }
  }

  function showConnBar(type, text) {
    const bar = document.getElementById('conn-bar');
    bar.className = 'conn-bar show ' + type;
    bar.textContent = text;
  }
  function hideConnBar() {
    document.getElementById('conn-bar').className = 'conn-bar';
  }

  function scrollBottom() {
    const list = document.getElementById('msg-list');
    if (list) list.scrollTop = list.scrollHeight;
  }

  function setPanel(panel) {
    document.getElementById('login-panel').style.display    = panel === 'login'    ? '' : 'none';
    document.getElementById('messages-panel').classList.toggle('active', panel === 'messages');
    document.getElementById('closed-panel').classList.toggle('active',   panel === 'closed');
  }

  function appendMsg(message) {
    const list  = document.getElementById('msg-list');
    const isMe  = message.from === 'user';
    const div   = document.createElement('div');
    div.className = `msg ${message.from}`;
    div.dataset.id = message.id;
    div.innerHTML = `
      ${!isMe ? `<div class="msg-sender">SUPPORT</div>` : ''}
      <div class="msg-bubble">${escHtml(message.text)}</div>
      <div class="msg-time">${message.time}</div>
    `;
    list.appendChild(div);
    if (isOpen) scrollBottom();
    else if (!isMe) { unread++; updateBadge(); }
  }

  function appendSys(text) {
    const list = document.getElementById('msg-list');
    const div  = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = text;
    list.appendChild(div);
    scrollBottom();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // ── WebSocket ────────────────────────────────────────────────
  function connect() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

    showConnBar('connecting', 'Menghubungkan...');

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      hideConnBar();
      clearTimeout(reconnectTimer);

      // Auth
      ws.send(JSON.stringify({
        type:      'auth',
        role:      'user',
        sessionId: sessionId,
        username:  username,
        discord:   discord,
      }));

      // Ping setiap 25 detik agar koneksi tidak putus
      clearInterval(pingTimer);
      pingTimer = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
      }, 25000);
    };

    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      handleMsg(msg);
    };

    ws.onclose = () => {
      clearInterval(pingTimer);
      if (sessionId) {
        showConnBar('offline', 'Terputus — mencoba reconnect...');
        reconnectTimer = setTimeout(connect, 3000);
      }
    };

    ws.onerror = () => { ws.close(); };
  }

  function handleMsg(msg) {
    if (msg.type === 'auth_ok') {
      sessionId = msg.sessionId;
      localStorage.setItem('owo_session', sessionId);
      setPanel('messages');
      // Render history
      if (msg.history && msg.history.length > 0) {
        document.getElementById('msg-list').innerHTML = '';
        msg.history.forEach(m => appendMsg(m));
      } else {
        appendSys('Sesi dimulai. Tim support akan segera membalas!');
      }
      return;
    }

    if (msg.type === 'auth_fail') {
      sessionId = null;
      localStorage.removeItem('owo_session');
      setPanel('login');
      return;
    }

    if (msg.type === 'message') {
      // Hindari duplikat
      if (document.querySelector(`[data-id="${msg.message.id}"]`)) return;
      appendMsg(msg.message);
      return;
    }

    if (msg.type === 'session_closed') {
      setPanel('closed');
      return;
    }
  }

  // ── SEND ─────────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ type: 'user_msg', text }));
    input.value = '';
    autoResize(input);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ── START CHAT ───────────────────────────────────────────────
  function startChat() {
    const u = document.getElementById('inp-username').value.trim();
    const d = document.getElementById('inp-discord').value.trim();
    if (!u) { document.getElementById('inp-username').focus(); return; }
    if (!d) { document.getElementById('inp-discord').focus(); return; }

    username = u;
    discord  = d;
    sessionId = null;
    localStorage.setItem('owo_username', u);
    localStorage.setItem('owo_discord',  d);
    localStorage.removeItem('owo_session');

    document.getElementById('start-btn').disabled = true;
    connect();
  }

  function resetChat() {
    sessionId = null;
    localStorage.removeItem('owo_session');
    document.getElementById('msg-list').innerHTML = '';
    document.getElementById('inp-username').value = '';
    document.getElementById('inp-discord').value  = '';
    document.getElementById('start-btn').disabled = false;
    if (ws) ws.close();
    setPanel('login');
  }

  // ── INIT ─────────────────────────────────────────────────────
  if (sessionId && username && discord) {
    // Auto-reconnect jika sudah pernah chat
    setPanel('messages');
    connect();
  } else {
    setPanel('login');
  }
</script>

</body>
</html>
