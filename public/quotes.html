<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owo Bimxr - Quotes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070f;
      --surface: #0d0d1c;
      --surface2: #111120;
      --border: rgba(255,255,255,0.06);
      --gold: #e8b84b;
      --gold2: #f5d78e;
      --gold-dim: rgba(232,184,75,0.12);
      --text: #e4e4f0;
      --text-muted: #6a6a88;
      --text-dim: #33334f;
      --accent: #7c6aff;
      --accent2: #a594ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(124,106,255,0.055) 0%, transparent 65%);
      top: -300px; right: -200px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,184,75,0.05) 0%, transparent 65%);
      bottom: -100px; left: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px 100px;
      position: relative;
      z-index: 1;
    }

    h1 {
      text-align: center;
      margin: 0 0 12px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 5.5vw, 4.2rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    h1 .word1 { color: var(--text); }
    h1 .word2 {
      display: block;
      font-style: italic;
      background: linear-gradient(130deg, var(--gold) 0%, var(--gold2) 55%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
    }

    .badge {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }
    .badge span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--gold-dim);
      border: 1px solid rgba(232,184,75,0.2);
      border-radius: 100px;
      padding: 5px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .badge-dot {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--gold);
      animation: blink 2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    .quote-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px 40px;
      margin-bottom: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.45);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.3s ease,
                  border-color 0.3s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
    }

    .quote-card::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, var(--gold-dim) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .quote-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(232,184,75,0.1);
      border-color: rgba(232,184,75,0.3);
    }
    .quote-card:hover::after { opacity: 1; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .quote-bigmark {
      position: absolute;
      top: 8px; left: 24px;
      font-family: 'Playfair Display', serif;
      font-size: 6rem;
      line-height: 1;
      color: var(--gold);
      opacity: 0.08;
      font-style: italic;
      pointer-events: none;
      user-select: none;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.18rem;
      line-height: 1.78;
      margin-bottom: 24px;
      font-style: italic;
      color: var(--text);
      position: relative;
      z-index: 1;
      padding-top: 6px;
    }

    .quote-author {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      text-align: right;
      color: var(--accent2);
      font-weight: 500;
    }

    .author-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      flex-shrink: 0;
    }

    .author-name {
      color: var(--accent2);
      font-weight: 500;
      font-size: 0.88rem;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.4; display: block; }
    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .loading { text-align: center; padding: 80px 0; }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      display: block;
    }

    #scroll-top {
      position: fixed;
      bottom: 28px; right: 28px;
      width: 42px; height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
    }
    #scroll-top.show { opacity: 1; pointer-events: all; }
    #scroll-top:hover { border-color: rgba(232,184,75,0.3); color: var(--gold); }

    .site-footer {
      text-align: center;
      padding: 0 24px 40px;
      position: relative;
      z-index: 1;
    }
    .site-footer span {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }
    .site-footer a { color: var(--gold); text-decoration: none; }
    .site-footer a:hover { opacity: 0.7; }

    .how-to {
  margin-bottom: 48px;
}
.how-to-inner {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 24px;
  max-width: 600px;
  margin: 0 auto;
}
.how-icon { font-size: 1.8rem; flex-shrink: 0; }
.how-text { flex: 1; }
.how-title {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
  margin-bottom: 3px;
}
.how-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
}
.how-btn {
  display: inline-block;
  background: var(--gold-dim);
  border: 1px solid rgba(232,184,75,0.25);
  color: var(--gold);
  text-decoration: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  padding: 8px 16px;
  border-radius: 10px;
  white-space: nowrap;
  transition: background 0.2s;
}
.how-btn:hover { background: rgba(232,184,75,0.2); }

    @media (max-width: 600px) {
      .quote-card { padding: 26px 22px; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="badge">
    <span><span class="badge-dot"></span> OWO BIM · Kraxx.my.id</span>
  </div>

  <h1>
    <span class="word1">💬 Owo</span>
    <span class="word2">Quotes</span>
  </h1>
  <p class="tagline">Quote terpilih dari komunitas — dikurasi dengan hati</p>

<div class="how-to">
  <div class="how-to-inner">
    <span class="how-icon">🤖</span>
    <div class="how-text">
      <div class="how-title">Mau submit quote?</div>
      <div class="how-sub">Gunakan bot Discord OWO BIM untuk submit quote</div>
    </div>
    <a href="https://discord.gg/jHv69FHd" target="_blank" class="how-btn">Join Server →</a>
  </div>
</div>

  <div id="quotes-container">
    <div class="loading">
      <div class="spinner"></div>
      <span class="loading-text">MEMUAT QUOTES...</span>
    </div>
  </div>

</div>

<footer class="site-footer">
  <span>© 2026 OWO BIM · <a href="https://owo.kraxx.my.id/quotes">Quotes OwoBim</a> · Dibuat dengan oleh by @bimxr</span>
</footer>

<div id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
  function getInitials(name) {
    return (name || '??').slice(0, 2).toUpperCase();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadQuotes() {
    try {
      const res = await fetch('/api/quotes');
      const quotes = await res.json();
      const container = document.getElementById('quotes-container');

      if (quotes.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <span class="empty-icon">💬</span>
            <div class="empty-title">Belum ada quote</div>
            <p>Belum ada quote yang disetujui saat ini...</p>
          </div>`;
        return;
      }

      container.innerHTML = quotes.map((q, i) => `
        <div class="quote-card" style="animation-delay:${i * 70}ms">
          <span class="quote-bigmark">"</span>
          <div class="quote-text">"${escapeHtml(q.teks)}"</div>
          <div class="quote-author">
            <div class="author-avatar">${getInitials(q.username)}</div>
            <div class="author-name">— ${escapeHtml(q.username)}</div>
          </div>
        </div>
      `).join('');

    } catch (e) {
      console.error(e);
    }
  }

  window.addEventListener('scroll', () => {
    document.getElementById('scroll-top')
      .classList.toggle('show', window.scrollY > 400);
  });

  loadQuotes();
  setInterval(loadQuotes, 30000); // refresh tiap 30 detik
</script>
</body>
</html>
